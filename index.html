<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>6C Absen Digital — SDN Lagoa 05</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Poppins:wght@600;700;800;900&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<style>
/* ═══════════════ OCEAN WORLD ═══════════════ */
:root{
  --deep:#003d6b;--ocean:#0077b6;--sea:#0096c7;
  --wave:#00b4d8;--surf:#48cae4;--foam:#90e0ef;
  --sky:#ade8f4;--pale:#caf0f8;--white:#ffffff;
  --sand:#fff9e6;--coral:#ff6b6b;--gold:#ffd60a;
  --text:#012a4a;--muted:#1e6091;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}

body{
  font-family:'Nunito',sans-serif;
  min-height:100vh;
  overflow-x:hidden;
  background:linear-gradient(180deg,
    #87ceeb 0%,#5bb8e8 8%,
    #0096c7 20%,#0077b6 40%,
    #023e8a 70%,#03045e 100%);
  color:var(--text);
}

/* scrconst GALLERYollbar */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--deep)}
::-webkit-scrollbar-thumb{background:var(--wave);border-radius:4px}

/* ─── OCEAN LAYERS ─── */
#ocean-scene{
  position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;
}

/* Sky gradient */
.sky-layer{
  position:absolute;top:0;left:0;right:0;height:35%;
  background:linear-gradient(180deg,#87ceeb 0%,#b8e4f9 60%,#d4f1ff 100%);
}

/* Sun */
.sun{
  position:absolute;top:5%;right:15%;
  width:70px;height:70px;border-radius:50%;
  background:radial-gradient(circle,#fff7a1,#ffd60a 50%,rgba(255,214,10,0));
  box-shadow:0 0 40px 15px rgba(255,214,10,0.35);
  animation:sun-pulse 4s ease-in-out infinite;
}
@keyframes sun-pulse{0%,100%{box-shadow:0 0 40px 15px rgba(255,214,10,0.35)}50%{box-shadow:0 0 60px 25px rgba(255,214,10,0.5)}}

/* Clouds */
.cloud{
  position:absolute;border-radius:50px;
  background:rgba(255,255,255,0.85);
  animation:drift-cloud linear infinite;
}
.cloud::before,.cloud::after{content:'';position:absolute;background:rgba(255,255,255,0.85);border-radius:50%}
@keyframes drift-cloud{from{transform:translateX(-200px)}to{transform:translateX(calc(100vw + 200px))}}

/* Ocean body */
.ocean-body{
  position:absolute;bottom:0;left:0;right:0;height:55%;
  background:linear-gradient(180deg,#0096c7 0%,#0077b6 30%,#023e8a 65%,#03045e 100%);
}

/* Waves SVG */
.wave-layer{
  position:absolute;left:-5%;right:-5%;
  animation:wave-flow linear infinite;
}
@keyframes wave-flow{from{transform:translateX(0)}to{transform:translateX(9%)}}

/* Underwater shimmer */
.shimmer{
  position:absolute;bottom:0;left:0;right:0;height:40%;
  background:repeating-linear-gradient(
    90deg,
    transparent 0px,
    rgba(255,255,255,0.03) 20px,
    transparent 40px
  );
  animation:shimmer-move 8s linear infinite;
}
@keyframes shimmer-move{from{transform:translateX(0)}to{transform:translateX(40px)}}

/* Fish */
.fish{
  position:absolute;font-size:20px;
  animation:swim-fish linear infinite;
  filter:drop-shadow(0 2px 6px rgba(0,0,0,0.3));
}
@keyframes swim-fish{
  0%{transform:translateX(-80px) scaleX(1)}
  49%{transform:translateX(calc(50vw - 10px)) scaleX(1)}
  50%{transform:translateX(calc(50vw)) scaleX(-1)}
  100%{transform:translateX(calc(100vw + 80px)) scaleX(-1)}
}
.fish-back{
  position:absolute;font-size:14px;opacity:0.6;
  animation:swim-fish-back linear infinite;
}
@keyframes swim-fish-back{
  0%{transform:translateX(calc(100vw + 60px)) scaleX(-1)}
  100%{transform:translateX(-60px) scaleX(-1)}
}

/* Bubbles */
.bub{
  position:absolute;border-radius:50%;
  background:radial-gradient(circle at 35% 35%,rgba(255,255,255,0.9),rgba(144,224,239,0.3));
  border:1px solid rgba(255,255,255,0.6);
  animation:bub-rise linear infinite;
}
@keyframes bub-rise{
  0%{transform:translateY(0) scale(1);opacity:0.8}
  100%{transform:translateY(-200px) scale(1.3);opacity:0}
}

/* Seaweed */
.seaweed{
  position:absolute;bottom:0;font-size:28px;
  animation:sway 3s ease-in-out infinite;
  transform-origin:bottom center;
  filter:drop-shadow(0 0 4px rgba(0,200,100,0.4));
}
@keyframes sway{0%,100%{transform:rotate(-10deg)}50%{transform:rotate(10deg)}}

/* Coral / sea floor elements */
.seafloor-el{position:absolute;bottom:0;font-size:24px;filter:drop-shadow(0 0 6px rgba(255,107,107,0.5))}

/* ─── GLASS CARDS ─── */
.card{
  background:rgba(255,255,255,0.92);
  border:2px solid rgba(255,255,255,0.8);
  border-radius:22px;
  backdrop-filter:blur(20px);
  box-shadow:0 8px 32px rgba(0,60,120,0.18),0 2px 8px rgba(255,255,255,0.5) inset;
  position:relative;z-index:2;
}
.card-ocean{
  background:rgba(0,150,199,0.18);
  border:2px solid rgba(72,202,228,0.5);
  border-radius:22px;
  backdrop-filter:blur(20px);
  box-shadow:0 8px 32px rgba(0,60,120,0.25);
  position:relative;z-index:2;
}
.card-deep{
  background:linear-gradient(135deg,rgba(0,119,182,0.9),rgba(0,150,199,0.85));
  border:2px solid rgba(72,202,228,0.5);
  border-radius:22px;
  backdrop-filter:blur(20px);
  box-shadow:0 8px 32px rgba(0,30,80,0.35);
  color:white;
  position:relative;z-index:2;
}
.card-white{
  background:white;
  border:2px solid rgba(0,150,199,0.2);
  border-radius:18px;
  box-shadow:0 4px 20px rgba(0,60,120,0.12);
  position:relative;z-index:2;
}

/* ─── TYPOGRAPHY ─── */
.t-ocean{background:linear-gradient(135deg,#0077b6,#00b4d8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.t-wave{background:linear-gradient(135deg,#90e0ef,#caf0f8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.t-white{color:white}

/* ─── BUTTONS ─── */
.btn{font-family:'Nunito',sans-serif;font-weight:800;font-size:14px;padding:12px 24px;border-radius:14px;border:none;cursor:pointer;transition:all .22s;display:inline-flex;align-items:center;gap:7px;justify-content:center}
.btn-ocean{background:linear-gradient(135deg,#0077b6,#0096c7);color:white;box-shadow:0 4px 20px rgba(0,119,182,0.45)}
.btn-ocean:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,119,182,0.6)}
.btn-surf{background:linear-gradient(135deg,#00b4d8,#48cae4);color:white;box-shadow:0 4px 16px rgba(0,180,216,0.4)}
.btn-surf:hover{transform:translateY(-2px);box-shadow:0 6px 22px rgba(0,180,216,0.55)}
.btn-foam{background:rgba(255,255,255,0.9);color:#0077b6;border:2px solid rgba(0,150,199,0.4);box-shadow:0 2px 12px rgba(0,60,120,0.12)}
.btn-foam:hover{background:white;border-color:#0096c7;transform:translateY(-1px);box-shadow:0 4px 18px rgba(0,60,120,0.2)}
.btn-red{background:linear-gradient(135deg,#dc2626,#ef4444);color:white;box-shadow:0 4px 16px rgba(220,38,38,0.35)}
.btn-red:hover{transform:translateY(-1px)}
.btn-dark-red{background:linear-gradient(135deg,#7f1d1d,#991b1b);color:white;box-shadow:0 4px 16px rgba(127,29,29,0.4)}

/* ─── INPUTS ─── */
.inp{width:100%;padding:13px 16px;background:rgba(255,255,255,0.95);border:2px solid rgba(0,150,199,0.3);border-radius:14px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:600;color:var(--text);outline:none;transition:all .2s}
.inp:focus{border-color:#0096c7;box-shadow:0 0 0 3px rgba(0,150,199,0.15)}
.inp::placeholder{color:#94a3b8;font-weight:600}
textarea.inp{resize:vertical;min-height:90px}
select.inp option{background:white;color:var(--text)}

/* ─── PAGES ─── */
.page{display:none;min-height:100vh;position:relative;z-index:2}
.page.active{display:block}

/* ─── TOPBAR ─── */
.topbar{
  position:sticky;top:0;z-index:50;
  background:rgba(0,60,107,0.88);
  border-bottom:2px solid rgba(72,202,228,0.4);
  backdrop-filter:blur(24px);
  padding:12px 16px;
  display:flex;align-items:center;justify-content:space-between;
  box-shadow:0 2px 20px rgba(0,30,80,0.3);
}

/* ─── SIDEBAR ─── */
.sidebar{
  position:fixed;left:0;top:0;bottom:0;width:258px;
  background:linear-gradient(180deg,#023e8a 0%,#0077b6 50%,#0096c7 100%);
  z-index:100;display:flex;flex-direction:column;padding:24px 16px;
  transform:translateX(-100%);transition:transform .3s cubic-bezier(.4,0,.2,1);
  box-shadow:4px 0 40px rgba(0,30,80,0.5);
  border-right:2px solid rgba(72,202,228,0.3);
}
.sidebar.open{transform:translateX(0)}
.sov{display:none;position:fixed;inset:0;background:rgba(0,20,60,0.55);z-index:99;backdrop-filter:blur(3px)}
.sov.open{display:block}
.nav-item{display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:14px;cursor:pointer;transition:all .2s;font-weight:700;font-size:13.5px;color:rgba(255,255,255,0.75);border:2px solid transparent;margin-bottom:5px}
.nav-item:hover{background:rgba(255,255,255,0.15);color:white;border-color:rgba(255,255,255,0.25)}
.nav-item.active{background:rgba(255,255,255,0.95);color:#0077b6;border-color:white;box-shadow:0 2px 12px rgba(0,0,0,0.15)}

/* ─── MODALS ─── */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,20,60,0.65);backdrop-filter:blur(10px);z-index:200;align-items:center;justify-content:center;padding:20px}
.modal-bg.open{display:flex}
.modal-box{background:white;border-radius:24px;padding:28px;width:100%;max-width:460px;box-shadow:0 20px 60px rgba(0,60,120,0.4);border:2px solid rgba(0,150,199,0.25);max-height:92vh;overflow-y:auto}

/* ─── MOOD BTNS ─── */
.mood-btn{display:flex;flex-direction:column;align-items:center;gap:5px;padding:12px 6px;border-radius:14px;cursor:pointer;border:2px solid rgba(0,150,199,0.25);background:rgba(255,255,255,0.9);transition:all .2s;font-size:11px;color:#64748b;font-weight:800}
.mood-btn:hover,.mood-btn.sel{border-color:#0096c7;background:linear-gradient(135deg,#e0f7ff,#f0fdff);color:#0077b6;transform:scale(1.07);box-shadow:0 4px 14px rgba(0,150,199,0.3)}

/* ─── STATUS BTNS ─── */
.sb{padding:7px 14px;border-radius:10px;font-size:12px;font-weight:800;cursor:pointer;transition:all .18s;border:2px solid transparent;font-family:'Nunito',sans-serif}
.sb-h{background:#dcfce7;color:#16a34a;border-color:#86efac}.sb-h:hover,.sb-h.act{background:#16a34a;color:white;border-color:#16a34a}
.sb-s{background:#fef9c3;color:#ca8a04;border-color:#fde047}.sb-s:hover,.sb-s.act{background:#ca8a04;color:white;border-color:#ca8a04}
.sb-i{background:#ede9fe;color:#7c3aed;border-color:#c4b5fd}.sb-i:hover,.sb-i.act{background:#7c3aed;color:white;border-color:#7c3aed}
.sb-a{background:#fee2e2;color:#dc2626;border-color:#fca5a5}.sb-a:hover,.sb-a.act{background:#dc2626;color:white;border-color:#dc2626}

/* ─── RANK ROWS ─── */
.rr{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:16px;background:white;border:2px solid rgba(0,150,199,0.15);margin-bottom:8px;box-shadow:0 2px 12px rgba(0,60,120,0.08);transition:all .2s}
.rr:hover{border-color:#0096c7;transform:translateX(3px);box-shadow:0 4px 20px rgba(0,60,120,0.15)}
.rr.g1{background:linear-gradient(135deg,#fffbeb,#fef3c7);border-color:#fbbf24}
.rr.g2{background:linear-gradient(135deg,#f8fafc,#f1f5f9);border-color:#94a3b8}
.rr.g3{background:linear-gradient(135deg,#fff7ed,#fed7aa);border-color:#f97316}

/* ─── CHAT ─── */
.cu{background:linear-gradient(135deg,#0077b6,#0096c7);color:white;border-radius:18px 18px 4px 18px;padding:10px 14px;font-size:14px;max-width:75%;align-self:flex-end;margin-bottom:8px;box-shadow:0 2px 12px rgba(0,119,182,0.35)}
.ca{background:white;border:2px solid rgba(0,150,199,0.2);border-radius:18px 18px 18px 4px;padding:10px 14px;font-size:14px;max-width:80%;align-self:flex-start;margin-bottom:8px;color:var(--text);box-shadow:0 2px 8px rgba(0,60,120,0.08)}

/* ─── NGL CARD ─── */
.ngl-c{background:white;border:2px solid rgba(0,150,199,0.2);border-radius:16px;padding:16px;margin-bottom:10px;border-left:4px solid #0096c7;box-shadow:0 2px 12px rgba(0,60,120,0.08)}

/* ─── GALLERY ─── */
.gal-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.gal-item{border-radius:18px;overflow:hidden;aspect-ratio:1;position:relative;cursor:pointer;transition:all .3s;border:3px solid rgba(72,202,228,0.4);box-shadow:0 4px 20px rgba(0,60,120,0.2);background:linear-gradient(135deg,#90e0ef,#caf0f8)}
.gal-item:hover{transform:scale(1.04) rotate(.5deg);border-color:#00b4d8;box-shadow:0 8px 32px rgba(0,100,200,0.35)}
.gal-item img{width:100%;height:100%;object-fit:cover}
.gal-ov{position:absolute;inset:0;background:linear-gradient(0deg,rgba(0,60,120,0.85) 0%,transparent 55%);opacity:0;transition:opacity .3s;display:flex;align-items:flex-end;padding:12px}
.gal-item:hover .gal-ov{opacity:1}
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,10,30,0.96);z-index:300;align-items:center;justify-content:center}
.lightbox.open{display:flex}
.lightbox img{max-width:92vw;max-height:88vh;border-radius:16px;border:3px solid rgba(72,202,228,0.6);box-shadow:0 0 80px rgba(0,150,200,0.5)}

/* ─── SEARCH ─── */
.ssr{position:absolute;top:100%;left:0;right:0;z-index:50;background:white;border:2px solid rgba(0,150,199,0.35);border-radius:14px;margin-top:4px;max-height:270px;overflow-y:auto;box-shadow:0 8px 32px rgba(0,60,120,0.2)}
.sri{padding:11px 16px;cursor:pointer;transition:background .15s;display:flex;align-items:center;justify-content:space-between;font-size:13px;color:var(--text);font-weight:700;border-bottom:1px solid #f0fdff}
.sri:hover{background:#e0f7ff;color:#0077b6}
.sri:last-child{border-bottom:none}

/* ─── PROGRESS ─── */
.prog{height:11px;background:rgba(255,255,255,0.3);border-radius:99px;overflow:hidden;border:1px solid rgba(255,255,255,0.4)}
.prog-f{height:100%;border-radius:99px;background:linear-gradient(90deg,#90e0ef,#00b4d8,#0096c7);transition:width .7s ease;box-shadow:0 0 8px rgba(0,180,216,0.5)}
.prog-w{height:10px;background:rgba(0,150,199,0.15);border-radius:99px;overflow:hidden}
.prog-fw{height:100%;border-radius:99px;background:linear-gradient(90deg,#0077b6,#00b4d8);transition:width .7s ease}

/* ─── SWITCH ─── */
.sw{position:relative;display:inline-block;width:44px;height:24px}
.sw input{opacity:0;width:0;height:0}
.sl{position:absolute;cursor:pointer;inset:0;background:rgba(255,255,255,0.25);border-radius:99px;transition:.3s;border:2px solid rgba(255,255,255,0.4)}
.sl:before{content:'';position:absolute;height:16px;width:16px;left:2px;bottom:2px;background:rgba(255,255,255,0.7);border-radius:50%;transition:.3s}
input:checked+.sl{background:#00b4d8}input:checked+.sl:before{transform:translateX(20px);background:white}

/* ─── LOADER ─── */
#loader{
  position:fixed;inset:0;z-index:9999;overflow:hidden;
  background:linear-gradient(180deg,#87ceeb 0%,#5bb8e8 15%,#0096c7 35%,#0077b6 55%,#023e8a 75%,#03045e 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
}
#loader-canvas{position:absolute;bottom:0;left:0;width:100%;height:220px;z-index:0}
.loader-content{position:relative;z-index:1;text-align:center}
.ld-sun{font-size:60px;animation:sun-pulse 2s ease-in-out infinite,float-y 3s ease-in-out infinite}
@keyframes float-y{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.ld-ring{width:52px;height:52px;border-radius:50%;border:3px solid rgba(255,255,255,0.3);border-top:3px solid white;animation:spin .8s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}

/* ─── BADGES ─── */
.badge{display:inline-flex;align-items:center;font-size:10px;font-weight:800;padding:3px 8px;border-radius:99px;letter-spacing:.3px}
.bg-g{background:#dcfce7;color:#16a34a;border:1.5px solid #86efac}
.bg-r{background:#fee2e2;color:#dc2626;border:1.5px solid #fca5a5}
.bg-y{background:#fef9c3;color:#ca8a04;border:1.5px solid #fde047}
.bg-b{background:#dbeafe;color:#1d4ed8;border:1.5px solid #93c5fd}
.bg-o{background:#fff7ed;color:#ea580c;border:1.5px solid #fdba74}

/* TOAST */
#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#0077b6,#0096c7);color:white;padding:13px 24px;border-radius:16px;font-size:14px;font-weight:800;z-index:9000;opacity:0;pointer-events:none;transition:opacity .3s;max-width:320px;text-align:center;box-shadow:0 8px 32px rgba(0,100,200,0.45);border:1.5px solid rgba(72,202,228,0.5)}
#toast.show{opacity:1}

/* PDF OPT */
.pdfo{background:white;border:2px solid rgba(0,150,199,0.25);border-radius:16px;padding:14px 18px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:12px;color:var(--text);font-weight:800;font-size:14px;box-shadow:0 2px 8px rgba(0,60,120,0.08)}
.pdfo:hover{border-color:#0096c7;background:#e0f7ff;color:#0077b6;transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,60,120,0.15)}

/* STAT CARD */
.sc{background:rgba(255,255,255,0.95);border-radius:18px;padding:16px;text-align:center;box-shadow:0 4px 20px rgba(0,60,120,0.12);border:2px solid rgba(0,150,199,0.18)}

/* ALERT PULSE */
@keyframes ap{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.55)}50%{box-shadow:0 0 0 9px rgba(239,68,68,0)}}
.pulse-r{animation:ap 1.6s infinite}

.mc{padding:16px;max-width:720px;margin:0 auto}
@media(min-width:768px){.mc{padding:24px 32px}}
body.ld *{animation:none!important;transition:none!important}

/* ─── GUEST BADGE ─── */
.guest-badge{
  display:inline-flex;align-items:center;gap:5px;
  background:linear-gradient(135deg,#f59e0b,#fbbf24);
  color:white;padding:3px 10px;border-radius:99px;
  font-size:10px;font-weight:800;letter-spacing:.5px;
  box-shadow:0 2px 8px rgba(245,158,11,0.4);
}

/* ─── DIVIDER ─── */
.div-ocean{height:2px;background:linear-gradient(90deg,transparent,#00b4d8,transparent);margin:16px 0;border:none}

/* ─── STAT MINI ─── */
.stat-mini{background:rgba(255,255,255,0.12);border-radius:12px;padding:10px 14px;border:1px solid rgba(255,255,255,0.2);text-align:center}
</style>
</head>
<body>

<!-- ═══ OCEAN SCENE ═══ -->
<div id="ocean-scene">
  <div class="sky-layer"></div>
  <div class="sun"></div>

  <!-- Clouds -->
